[general]
# 确保解析本地伪域名
force_http_engine_hosts = script.hub, *.script.hub

[filter_local]
# 拦截 QUIC 协议，强制走 TCP 以便进行身份伪装和解密
host-suffix, ddgksf2013.top, reject-quic

[rewrite_local]
# 1. 核心身份伪装：向墨鱼服务器请求时，强制将 UA 替换为 Surge
# 这一步解决了“墨鱼允许 Surge 访问但拒绝 Stash”的问题
^https?:\/\/ddgksf2013\.top\/ url request-header User-Agent Surge/2802 (iPhone15,2; iOS 17.0)

# 2. 网页变身脚本
# 这里通过 ScriptHub 包装：使用 type=clash 确保发回给 Stash 的代码是 Stash 兼容的
^https?:\/\/ddgksf2013\.top\/$ url script-response-body https://你的SH地址/convert?type=clash&url=https://ddgksf2013.top/scripts/web.rocket.js

# 3. ScriptHub 本地解析器逻辑 (保留你原本提供的部分)
^https?:\/\/script\.hub\/file\/_start_\/.+type=(?:qx-rewrite|surge-module|all-module) url script-request-header https://raw.githubusercontent.com/Script-Hub-Org/Script-Hub/main/Rewrite-Parser.js

[mitm]
hostname = script.hub, *.script.hub, ddgksf2013.top
