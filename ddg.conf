name: 墨鱼库适配 (Surge UA 身份版)
desc: 伪装成 Surge 以获取脚本，并通过 ScriptHub 转换语法
# ---------------------------------------------------

general:
  # 确保拦截并解析 script.hub 的本地流量
  force-http-engine-hosts:
    - "script.hub"
    - "*.script.hub"

# 1. 核心身份伪装：将 Stash 的身份替换为 Surge
# 这解决了“墨鱼允许 Surge 但拦截 Stash”的问题
http-header-rewrite:
  - match: ^https?://ddgksf2013\.top/.*
    name: FakeSurgeUA
    type: request
    header-replace:
      User-Agent: "Surge/2802 (iPhone15,2; iOS 17.0)"

# 2. 脚本逻辑：将 QX 语法交给 ScriptHub 翻译
scripting:
  scripts:
    - name: 网页变身
      type: http-response
      pattern: "^https?://ddgksf2013\\.top/$"
      # 注意：script-path 必须套用 ScriptHub 转换链接
      script-path: "https://你的SH地址/convert?type=clash-script&url=https://ddgksf2013.top/scripts/web.rocket.js"
      requires-body: true
      max-size: -1
      timeout: 3.5

    - name: 脚本转换
      type: http-request
      pattern: "^https?://script\\.hub/file/_start_/.+type=(?:qx-rewrite|surge-module|all-module)"
      script-path: "https://raw.githubusercontent.com/Script-Hub-Org/Script-Hub/main/Rewrite-Parser.js"
      timeout: 0.3

# 3. 拦截 QUIC 确保解析
rules:
  - AND,((DOMAIN-SUFFIX,ddgksf2013.top),(PROTOCOL,QUIC)),REJECT

# 4. 解密配置
mitm:
  hostname:
    - "script.hub"
    - "*.script.hub"
    - "ddgksf2013.top"
